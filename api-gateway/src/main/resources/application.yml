server:
  port: 8080

spring:
  application:
    name: api-gateway
  cloud:
    gateway:
      server:
        webmvc:
          routes:
            - id: student-service
              uri: http://localhost:8081
              predicates:
                - Path=/api/students,/api/students/**

            - id: course-service
              uri: http://localhost:8082
              predicates:
                - Path=/api/courses,/api/courses/**

            - id: enrollment-service
              uri: http://localhost:8083
              predicates:
                - Path=/api/enrollments,/api/enrollments/**

logging:
  level:
    org.springframework.cloud.gateway: DEBUG
