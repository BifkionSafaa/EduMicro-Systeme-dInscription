spring.application.name=enrollment-service

# Configuration du serveur
server.port=8083
server.servlet.context-path=/api

# Configuration MySQL
spring.datasource.url=jdbc:mysql://localhost:3307/enrollment_db?useSSL=false&serverTimezone=UTC
spring.datasource.username=root
spring.datasource.password=root
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# JPA Configuration
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true

# URLs des microservices  (pour WebClient)
student.service.url=http://localhost:8081/api
course.service.url=http://localhost:8082/api
