spring.application.name=enrollment-service

# Configuration du serveur
server.port=8083
server.servlet.context-path=/api

# Configuration MySQL
spring.datasource.url=jdbc:mysql://localhost:3307/enrollment_db?useSSL=false&serverTimezone=UTC
spring.datasource.username=root
spring.datasource.password=root
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# JPA Configuration
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true

# URLs des microservices via Eureka (pour WebClient + LoadBalancer)
student.service.url=http://student-service/api
course.service.url=http://course-service/api

# Eureka client
eureka.client.service-url.defaultZone=http://localhost:8761/eureka/
eureka.instance.prefer-ip-address=true
